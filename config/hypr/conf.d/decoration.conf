# conf.d/decoration.conf — the "smoking mirror" look: obsidian glass, soft smoke.
#
# Colors here are placeholders in the signature palette; Phase 3 (matugen) will
# drive borders/shadows from ~/.config/tezca/current/. Until then these are the
# hand-tuned obsidian defaults.

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2

    # Turquoise/jade accent (active) → smoke grey (inactive). Sparingly.
    col.active_border = rgba(3FB8AFff) rgba(2A8C86ff) 45deg
    col.inactive_border = rgba(1A1E1Faa)

    layout = dwindle
    resize_on_border = true
    allow_tearing = true      # required for per-window tearing; opt-in via rules
}

decoration {
    rounding = 12

    # Glass: translucent surfaces so the wallpaper/blur reads through.
    active_opacity = 0.98
    inactive_opacity = 0.92

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.015
        contrast = 1.05
        brightness = 0.85     # darken behind glass → obsidian, not milky
        vibrancy = 0.15
    }

    # Soft smoke shadow, nothing hard-edged.
    shadow {
        enabled = true
        range = 24
        render_power = 3
        color = rgba(00000055)
        color_inactive = rgba(00000033)
    }
}

# Dwindle layout tuning.
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true                 # variable frame rate: idle → save GPU on 165 Hz
    focus_on_activate = true
}
