# Project:Tezca — tezca-bar configuration.
#
# The bespoke gtk4-rs top menubar (DESIGN.md §6), replacing Waybar. A thin
# translucent obsidian strip across the top of every monitor: per-app label +
# workspaces on the left, now-playing centred, metrics/controls/clock/power on
# the right, with expandable glass popovers. Colors follow the active theme
# (`tezca theme`) automatically — nothing here hard-codes a hex.
#
# tezca-bar reads this file on launch; `tezca bar restart` after editing (or
# `tezca bar set <key> <value>`, which edits + restarts for you).

# --- Shape -----------------------------------------------------------------
# floating : rounded glass strip, inset from the screen edges (macOS feel).
# edge     : full-width, square, edge-to-edge, single bottom hairline.
shape = floating

# --- Geometry --------------------------------------------------------------
height = 40  # bar height, px (the glass strip)
margin_top = 6  # gap above the bar (floating only), px
margin_side = 10  # gap left/right of the bar (floating only), px

# --- Poll intervals (seconds) ----------------------------------------------
cpu_interval = 3  # CPU sparkline + percentage
mem_interval = 5  # MEM sparkline + percentage
gpu_interval = 3  # GPU sparkline + percentage (auto-hidden if no GPU source)
net_interval = 5  # network glyph + throughput

# --- Clock -----------------------------------------------------------------
# strftime-style; matches the Waybar format the bar reaches parity with.
clock_format = "%a %d %b   %H:%M"

# --- AI provider usage -----------------------------------------------------
# The [󰚩 41%] module: how much of your AI subscription's rate-limit window
# you've burned. Click it for the per-provider breakdown.
#
# This is the ONLY module that can make a network request, so it is opt-in and
# deliberately conservative. What it will and won't do:
#   * It never stores a credential. There is no Tezca keyring entry and no
#     token in this file. It reads the credential file the provider's own CLI
#     already wrote (e.g. ~/.claude/.credentials.json, mode 0600) for one
#     request, and never writes to it.
#   * The token is passed to curl on stdin, never on the command line, so it
#     can't be scraped out of /proc/<pid>/cmdline by other local processes.
#   * Hosts are allowlisted in the source (crates/tezca-bar/src/ai.rs), HTTPS
#     is pinned, and redirects are refused — no config value can widen that.
#   * Error text is scrubbed of anything token-shaped before display.
#   * No telemetry. Nothing is ever reported back to Tezca.
# Set ai_live = false for a fully offline mode: no network at all, just the
# token counts computed from your own local logs.
ai_enabled = true

# Which providers to poll, comma-separated: anthropic, openai, google.
# A provider whose CLI/credentials aren't installed hides itself silently, so
# listing one you don't use costs nothing. Unknown names are ignored.
#   anthropic → live 5h/weekly plan limits + local token & cost totals
#   openai    → Codex 5h/weekly limits via the local `codex app-server`
#   google    → approximate daily token count from Gemini CLI session files
#               (Google exposes no quota API — treat it as a warning signal)
ai_providers = anthropic

# Seconds between polls. Clamped to a 60s floor: the Anthropic usage endpoint
# is aggressively rate-limited and shares its 429 bucket with Claude Code
# itself, so polling hard would throttle your actual work. 300 is plenty.
ai_interval = 300

# Allow network requests. false = offline mode — local logs only, so no plan
# percentages (those are server-side state), just today's tokens and cost.
ai_live = true

# Compute today's token totals and API-equivalent cost from local logs.
# Purely local filesystem work; needs no credentials and no network.
ai_local = true

# Percent thresholds where the module turns gold, then urgent-red.
ai_warn = 60
ai_critical = 85

# --- Per-monitor adaptive --------------------------------------------------
# Monitors narrower than this (px) render the COMPACT layout — no per-app menu
# label, tighter padding. The 3440×1440 ultrawide primary stays full; the
# 2560×1440 secondary goes compact. Set very high to force compact everywhere.
compact_width = 3000

# --- Workspaces ------------------------------------------------------------
# Pill labels: "arabic" (1 2 3 …) or "mayan" — the Mesoamerican bar-and-dot
# numerals (a dot = 1, a bar = 5), from the Unicode Mayan Numerals block.
# Needs the Noto Sans Mayan Numerals font (Noto extra fonts).
workspace_numerals = mayan

# Show only workspaces that are in use — occupied by a window, or focused —
# hiding empty pills. Applies to both assigned and dynamic sets.
workspace_hide_empty = true

# Auto-compact each monitor's assigned set: when a workspace you're not looking
# at empties out, the higher workspaces in that monitor's set slide down to
# close the gap (windows move, staying on the same monitor; the workspace you're
# viewing never moves). Needs a `workspaces.<connector>` assignment above.
workspace_compact = true

# Assign which workspaces each monitor's bar shows, by connector name. A monitor
# listed here shows exactly those pills, always (empty ones included), in order;
# unlisted monitors mirror whatever Hyprland has placed on them. Accepts an
# explicit list ("1,3,5,7,9"), a range ("1-5"), or the shorthands "odd"/"even".
# Keep these in step with the Hyprland `workspace = N, monitor:X` binding rules
# in conf.d/monitors.conf so a pill switches to a workspace that lives here.
#   DP-1 = Xiaomi ultrawide · DP-3 = LG UltraGear (see `hyprctl monitors`).
workspaces.DP-1 = odd    # 1 3 5 7 9  on the Xiaomi ultrawide
workspaces.DP-3 = even   # 2 4 6 8 10 on the LG
