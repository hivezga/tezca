# Project:Tezca — kitty terminal (obsidian glass).
#
# Colors are the signature `obsidian` palette, hand-set for now. Phase 3
# (matugen) will emit ~/.config/tezca/current/kitty.conf and this file will
# `include` it so the terminal recolors with the wallpaper.

# --- Font -----------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
font_size        11.5
disable_ligatures never

# --- Window / glass -------------------------------------------------------
background_opacity        0.90
background_blur           1
window_padding_width      10
hide_window_decorations   yes
confirm_os_window_close   0
placement_strategy        center

# --- Obsidian palette -----------------------------------------------------
foreground   #D6DBDC
background   #0B0E0F
cursor       #3FB8AF
cursor_text_color #0B0E0F

selection_foreground #0B0E0F
selection_background #3FB8AF

# Turquoise/jade-leaning accents; smoke greys for the rest.
# black
color0  #14181A
color8  #2A3033
# red
color1  #E06B74
color9  #E88A91
# green (jade)
color2  #56C596
color10 #7BD6AF
# yellow (obsidian-gold)
color3  #D4B36A
color11 #E2C88A
# blue
color4  #5AA9E6
color12 #82C0EE
# magenta
color5  #B58BD6
color13 #C9A8E4
# cyan (signature turquoise)
color6  #3FB8AF
color14 #6BCEC7
# white / smoke
color7  #B7BEBF
color15 #EDF1F1

# --- Behaviour ------------------------------------------------------------
scrollback_lines      10000
enable_audio_bell     no
copy_on_select        clipboard
url_style             curly
tab_bar_edge          top
tab_bar_style         powerline
