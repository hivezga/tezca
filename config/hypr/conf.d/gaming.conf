# conf.d/gaming.conf — the lean, low-latency path (DESIGN.md §9, §11).
#
# This file holds the STATIC, always-on gaming rules. The RUNTIME half of the
# profile — stripping blur/shadows/animations for the lowest-latency present —
# is toggled by `tezca game on|off` (SUPER+G), which layers `hyprctl keyword`
# tweaks on top of these rules and restores them with `hyprctl reload`.
#
# `allow_tearing = true` is set globally in decoration.conf, but tearing only
# actually happens for windows that opt in via the `immediate` rule below.
# Desktop apps stay tear-free; games get the lowest-latency present.
#
# 0.55 windowrule grammar — see conf.d/windowrules.conf header for the full note.
# Shape: `windowrule = <rule> <value>, match:<key> <regex>`. Booleans need on/off.

# --- Low-latency present (tearing) ----------------------------------------
# Known game/launcher classes → allow tearing (immediate present). Steam Play
# titles surface as `steam_app_<appid>`; native Wine/Proton windows as `*.exe`;
# gamescope wraps problem titles in its own nested compositor.
windowrule = immediate on, match:class ^(steam_app_\d+)$
windowrule = immediate on, match:class ^(gamescope)$
windowrule = immediate on, match:class ^(cs2|dota2|.*\.exe)$

# --- Strip decoration on game windows -------------------------------------
# No blur, fully opaque, no shadow — every frame counts. These are per-window so
# they hold even when game mode is OFF (a game window never needs glass).
windowrule = no_blur on,   match:class ^(steam_app_\d+)$
windowrule = opaque on,    match:class ^(steam_app_\d+)$
windowrule = no_shadow on, match:class ^(steam_app_\d+)$
windowrule = no_blur on,   match:class ^(gamescope)$
windowrule = opaque on,    match:class ^(gamescope)$
windowrule = no_shadow on, match:class ^(gamescope)$

# --- Auto-move games to the gaming workspace ------------------------------
# Semantic workspace 5 (ultrawide / DP-1) is the games screen — see
# monitors.conf. Full game windows land there so they never share a workspace
# with the desktop, and go straight to fullscreen.
windowrule = workspace 5,   match:class ^(steam_app_\d+)$
windowrule = fullscreen on, match:class ^(steam_app_\d+)$
windowrule = workspace 5,   match:class ^(gamescope)$
windowrule = fullscreen on, match:class ^(gamescope)$

# --- Launcher / storefront chrome -----------------------------------------
# Steam's own client windows behave better floating for dialogs.
windowrule = float on, match:class ^(steam)$, match:title ^(Friends List|Steam Settings)$
# Other launchers float their transient config dialogs sanely.
windowrule = float on, match:class ^(lutris)$, match:title ^(.*[Cc]onfigure.*)$
