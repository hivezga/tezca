# Project:Tezca — kitty palette (matugen template).
#
# Rendered by matugen into ~/.config/tezca/current/colors-kitty.conf and
# `include`d by kitty.conf. Only the surfaces (bg/fg/cursor/selection) track the
# wallpaper; the 16 ANSI colors stay a fixed, tasteful obsidian set so terminal
# semantics survive (git-diff red never becomes teal on a teal wallpaper).

foreground            {{colors.on_surface.default.hex}}
background            {{colors.surface_container_lowest.default.hex}}
cursor                {{colors.primary.default.hex}}
cursor_text_color     {{colors.surface_container_lowest.default.hex}}
selection_foreground  {{colors.on_primary.default.hex}}
selection_background  {{colors.primary.default.hex}}

# --- Fixed obsidian ANSI (turquoise/jade-leaning accents, smoke greys) ---
# black
color0  #14181A
color8  #2A3033
# red
color1  #E06B74
color9  #E88A91
# green (jade)
color2  #56C596
color10 #7BD6AF
# yellow (obsidian-gold)
color3  #D4B36A
color11 #E2C88A
# blue
color4  #5AA9E6
color12 #82C0EE
# magenta
color5  #B58BD6
color13 #C9A8E4
# cyan (signature turquoise)
color6  #3FB8AF
color14 #6BCEC7
# white / smoke
color7  #B7BEBF
