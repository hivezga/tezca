# conf.d/autostart.conf — session startup.
#
# Phase 1 keeps this deliberately MINIMAL: only what a bootable, correct session
# needs. The full aesthetic stack (Waybar, swaync, swww, walker, dock) is added
# in Phase 2 — its exec-once lines are staged below, commented, so enabling them
# later is a one-line uncomment.
#
# Launch GUI services through `uwsm app` so they land in the right systemd slice
# (correct cgroup accounting, clean shutdown).

# --- Phase 1: essential -------------------------------------------------
# Polkit agent — GUI auth prompts (sudo-in-GUI, mount, etc.).
exec-once = uwsm app -- systemctl --user start hyprpolkitagent 2>/dev/null || uwsm app -- /usr/lib/hyprpolkitagent/hyprpolkitagent

# Clipboard history daemon (text + images) — cheap, useful from day one.
exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

# --- Phase 2: aesthetic core (uncomment as installed) -------------------
# exec-once = uwsm app -- waybar
# exec-once = uwsm app -- swaync
# exec-once = uwsm app -- swww-daemon
# exec-once = uwsm app -- nwg-dock-hyprland -d
# exec-once = uwsm app -- hypridle

# --- Wallpaper ----------------------------------------------------------
# Phase 2 uses swww; until then, a flat obsidian background so a fresh session
# is never a jarring default-grey. hyprctl sets the base color at startup.
exec-once = hyprctl keyword misc:background_color 0x0B0E0F
