# Project:Tezca — smoke (curated) hyprlock palette + wallpaper.
# Copied into ~/.config/tezca/current/colors-hyprlock.conf and sourced by
# hyprlock.conf. The `tezca` CLI fills in $tz_wallpaper with the resolved
# absolute wallpaper path on apply. Mirrors templates/colors-hyprlock.conf;
# the light counterpart of themes/obsidian/colors-hyprlock.conf.

$tz_wallpaper     = __TZ_WALLPAPER__
$tz_base          = rgb(F1F4F5)
$tz_text          = rgb(16191B)
$tz_muted         = rgb(6C7479)
$tz_accent        = rgb(1F8A82)
$tz_gold          = rgb(9C7A22)
$tz_urgent        = rgb(C0392F)
$tz_input_outline = rgba(1F8A8259)
$tz_input_bg      = rgba(FFFFFFcc)
