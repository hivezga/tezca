# Project:Tezca — kitty terminal (obsidian glass).
#
# The palette lives in the theme engine: `include`d from the stable path the
# `tezca` CLI repoints per theme. The relative include resolves against
# ~/.config/kitty/ (the symlink location) → ~/.config/tezca/current/. kitty
# re-reads on SIGUSR1 (sent by `tezca theme`). Edit templates/ or themes/.
include ../tezca/current/colors-kitty.conf

# --- Font -----------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
font_size        11.5
disable_ligatures never

# --- Window / glass -------------------------------------------------------
background_opacity        0.90
background_blur           1
window_padding_width      10
hide_window_decorations   yes
confirm_os_window_close   0
placement_strategy        center

# --- Palette --------------------------------------------------------------
# (comes from the `include` at the top → ~/.config/tezca/current/colors-kitty.conf)

# --- Behaviour ------------------------------------------------------------
scrollback_lines      10000
enable_audio_bell     no
copy_on_select        clipboard
url_style             curly
tab_bar_edge          top
tab_bar_style         powerline
