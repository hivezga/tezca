# Project:Tezca — hypridle (idle / lock / dpms orchestration).
#
# CURRENT PROFILE: "always on" — no auto-lock, no monitor blanking, no suspend.
# The user leaves this desktop running (NVIDIA gaming/AI box; long jobs, and the
# machine stays on deliberately). Every idle listener is disabled below.
#
# `lock_cmd` is kept so a MANUAL lock (SUPER+SHIFT+L / `loginctl lock-session`)
# still works and uses hyprlock — nothing here triggers it automatically.
# To restore an idle timeline later, uncomment the listeners.

general {
    lock_cmd = pidof hyprlock || uwsm app -- hyprlock   # manual lock only; nothing auto-fires it
    ignore_dbus_inhibit = false
    ignore_systemd_inhibit = false
}

# --- Idle listeners: ALL DISABLED (always-on) --------------------------------
# 10 minutes → lock the session.
# listener {
#     timeout = 600
#     on-timeout = loginctl lock-session
# }

# 15 minutes → power down the displays (DPMS). Resume on any input.
# listener {
#     timeout = 900
#     on-timeout = hyprctl dispatch dpms off
#     on-resume = hyprctl dispatch dpms on
# }

# 30 minutes → suspend (leave OFF for an always-on desktop).
# listener {
#     timeout = 1800
#     on-timeout = systemctl suspend
# }
