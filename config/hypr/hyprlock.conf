# Project:Tezca — hyprlock (obsidian lockscreen).
# "Smoking mirror": the wallpaper, darkened and blurred behind a floating glass
# clock + input. Turquoise accent on focus. Native, GPU, NVIDIA-friendly.
#
# Colors + the wallpaper path come from the theme engine: $tz_* variables (and
# $tz_wallpaper) are defined in ~/.config/tezca/current/colors-hyprlock.conf,
# which the `tezca` CLI repoints per theme. Sourced FIRST so the variables exist
# before use below. Edit templates/ or themes/, not this file.
source = ~/.config/tezca/current/colors-hyprlock.conf

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
}

background {
    monitor =
    path = $tz_wallpaper
    # Darkened obsidian glass over the wallpaper.
    blur_passes = 3
    blur_size = 8
    brightness = 0.55
    contrast = 1.05
    vibrancy = 0.15
    color = $tz_base
}

# Big clock, upper-center.
label {
    monitor =
    text = $TIME
    font_size = 92
    font_family = Inter Display Light
    color = $tz_text
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(0,0,0,0.5)
}

# Date under the clock.
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 22
    font_family = Inter
    color = $tz_muted
    position = 0, 108
    halign = center
    valign = center
}

# "Smoking mirror" wordmark, subtle, above the input.
label {
    monitor =
    text = Tezca
    font_size = 16
    font_family = Inter SemiBold
    color = $tz_accent
    position = 0, 20
    halign = center
    valign = center
}

# Password input — floating obsidian glass pill, turquoise on focus.
input-field {
    monitor =
    size = 340, 56
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.32
    dots_center = true
    dots_rounding = -1
    rounding = 16
    outer_color = $tz_input_outline
    inner_color = $tz_input_bg
    font_color = $tz_text
    check_color = $tz_accent
    fail_color = $tz_urgent
    capslock_color = $tz_gold
    placeholder_text = <span foreground="##8B9398">Unlock</span>
    fail_text = <span foreground="##E06C75">$FAIL</span>
    position = 0, -60
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 10
    shadow_color = rgba(0,0,0,0.5)
}
