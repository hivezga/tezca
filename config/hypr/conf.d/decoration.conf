# conf.d/decoration.conf — the "smoking mirror" look: obsidian glass, soft smoke.
#
# Border + shadow colors come from the theme engine. $tz_* variables are defined
# in ~/.config/tezca/current/colors-hypr.conf, which the `tezca` CLI repoints per
# theme (obsidian default, or wallpaper-extracted via matugen). Sourced FIRST so
# the variables exist before the general{} block below uses them. `hyprctl reload`
# (sent by `tezca theme`) recolors the borders live. Edit templates/ or themes/.
source = ~/.config/tezca/current/colors-hypr.conf

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2

    # Turquoise/jade accent (active) → smoke grey (inactive). Sparingly.
    col.active_border = $tz_accent $tz_accent_dim 45deg
    col.inactive_border = $tz_inactive

    layout = dwindle
    resize_on_border = true
    allow_tearing = true      # required for per-window tearing; opt-in via rules
}

decoration {
    rounding = 12

    # Glass: translucent surfaces so the wallpaper/blur reads through.
    active_opacity = 0.98
    inactive_opacity = 0.92

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.015
        contrast = 1.05
        brightness = 0.85     # darken behind glass → obsidian, not milky
        vibrancy = 0.15
    }

    # Soft smoke shadow, nothing hard-edged.
    shadow {
        enabled = true
        range = 24
        render_power = 3
        color = $tz_shadow
        color_inactive = $tz_shadow_dim
    }
}

# Dwindle layout tuning.
# `pseudotile` was removed from the dwindle block in Hyprland 0.55 (pseudo is now
# driven only by the `pseudo` dispatcher / windowrule), so it's gone from here.
dwindle {
    preserve_split = true
    smart_split = false
}

# Shell-layer glass — blur the translucent Waybar / swaync / Walker surfaces so
# they read as obsidian glass over the wallpaper. `ignorezero` keeps fully
# transparent regions (padding around floating modules) from being blurred.
#
# Hyprland 0.55 layerrule grammar drift (mirrors the windowrule change):
#   - `blur` is now a boolean rule → `blur on`.
#   - `ignorezero` was removed; use `ignore_alpha <threshold>` (underscore form,
#     like no_blur/no_shadow) — pixels below the opacity threshold aren't blurred,
#     which keeps the transparent margins around floating modules crisp.
#   - the namespace is matched with the `match:namespace <regex>` matcher.
# Bare `blur, waybar` is rejected as "invalid field blur: missing a value".
# tezca-bar (bespoke Rust menubar, Phase 10) — the obsidian-glass top strip.
# Same contract as Waybar below: translucent background here, compositor frosts
# it. Waybar rules kept as a documented fallback for anyone who reverts.
layerrule = blur on, match:namespace tezca-bar
layerrule = ignore_alpha 0.2, match:namespace tezca-bar
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.2, match:namespace waybar
layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0.2, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.2, match:namespace swaync-notification-window
layerrule = blur on, match:namespace walker
layerrule = ignore_alpha 0.2, match:namespace walker
# The autohiding dock and the wlogout power veil are obsidian glass too.
# tezca-dock (bespoke Rust dock, Phase 5) draws a translucent obsidian pill and
# relies on the compositor to frost the wallpaper behind it. nwg-dock rules kept
# as a fallback for anyone who reverts to it.
layerrule = blur on, match:namespace tezca-dock
layerrule = ignore_alpha 0.2, match:namespace tezca-dock
layerrule = blur on, match:namespace nwg-dock
layerrule = ignore_alpha 0.2, match:namespace nwg-dock
layerrule = blur on, match:namespace wlogout
layerrule = ignore_alpha 0.2, match:namespace wlogout

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    # `misc:vfr` was removed in Hyprland 0.55 — VFR is now always-on internally,
    # so there's no knob to set (idle frames are throttled automatically).
    focus_on_activate = true
}
