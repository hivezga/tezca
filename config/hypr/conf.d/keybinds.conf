# conf.d/keybinds.conf — Tezca keybindings, HyDE-parity layout.
#
# SUPER is the Tezca modifier (⌘-like). This map mirrors HyDE's KEYBINDINGS.md
# as closely as Tezca's stack allows, so HyDE muscle-memory transfers 1:1.
# Differences by design:
#   • Menus use Walker + its elephant providers instead of HyDE's rofi.
#   • Tezca's own identity actions (AI, Claude, bespoke dock) live on SUPER+ALT+*
#     because their HyDE keys (A=app-finder, C=editor) are taken by parity.
#   • Game mode sits on SUPER+ALT+G — which is exactly where HyDE puts it too.
# Cheat-sheet: SUPER+/  (Walker keybind hint, see scripts/cheatsheet.sh).
# Control center (full GUI): SUPER+SHIFT+A  →  tezca-settings.
#
# $mod = SUPER (defined in input.conf).

# =============================== Window management ===========================
bind = CTRL, Q,        killactive                 # close focused window (HyDE)
bind = ALT, F4,        killactive                 # close focused window (HyDE)
bind = $mod, Q,        killactive                 # Tezca bonus alias
bind = $mod, Delete,   exec, uwsm stop            # kill the Hyprland session (HyDE)
bind = $mod, W,        togglefloating             # toggle float (HyDE)
bind = $mod, G,        togglegroup                # toggle group (HyDE)
bind = SHIFT, F11,     fullscreen, 0              # toggle fullscreen (HyDE)
bind = $mod, F,        fullscreen, 0              # Tezca bonus: fullscreen
bind = $mod SHIFT, F,  pin                        # toggle pin on focused window (HyDE)
bind = $mod, J,        layoutmsg, togglesplit     # toggle split — dwindle (HyDE)
bind = $mod, L,        exec, uwsm app -- hyprlock # lock screen (HyDE)
bind = ALT, Control_R, exec, $HOME/.config/hypr/scripts/waybar-toggle.sh  # toggle Waybar (HyDE)

# Group navigation.
bind = $mod CTRL, H,   changegroupactive, b       # active group backwards (HyDE)
bind = $mod CTRL, L,   changegroupactive, f       # active group forwards (HyDE)

# --- Focus (arrows, HyDE-style) -------------------------------------------
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = ALT,  Tab,   cyclenext                     # cycle focus (HyDE)
bind = ALT,  Tab,   bringactivetotop

# --- Resize the active window (SUPER+SHIFT+arrows, HyDE) -------------------
binde = $mod SHIFT, left,  resizeactive, -40 0
binde = $mod SHIFT, right, resizeactive,  40 0
binde = $mod SHIFT, up,    resizeactive,  0 -40
binde = $mod SHIFT, down,  resizeactive,  0  40

# --- Move the active window (SUPER+CTRL+SHIFT+arrows, HyDE) ----------------
bind = $mod CTRL SHIFT, left,  movewindow, l
bind = $mod CTRL SHIFT, right, movewindow, r
bind = $mod CTRL SHIFT, up,    movewindow, u
bind = $mod CTRL SHIFT, down,  movewindow, d

# --- Move / resize with the pointer or a held key (HyDE) ------------------
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bindm = $mod, Z,         movewindow                # hold to move   (HyDE)
bindm = $mod, X,         resizewindow              # hold to resize (HyDE)

# ============================ Launcher — applications ========================
bind = $mod, T,         exec, uwsm app -- kitty                       # terminal (HyDE)
bind = $mod, Return,    exec, uwsm app -- kitty                       # Tezca bonus alias
bind = $mod ALT, T,     exec, $HOME/.config/hypr/scripts/scratch-term.sh  # dropdown terminal (HyDE)
bind = $mod, E,         exec, uwsm app -- dolphin                     # file explorer (HyDE)
bind = $mod, C,         exec, uwsm app -- code                        # text editor (HyDE)
bind = $mod, B,         exec, uwsm app -- brave                       # web browser (HyDE)
bind = CTRL SHIFT, Escape, exec, uwsm app -- kitty --class tezca-sysmon -e btop  # system monitor (HyDE)

# =========================== Launcher — Walker menus =========================
# Walker replaces HyDE's rofi; each menu is an elephant provider.
bind = $mod, A,        exec, uwsm app -- walker -m desktopapplications   # application finder (HyDE)
bind = $mod, SPACE,    exec, uwsm app -- walker                          # Spotlight muscle-memory (Tezca, DESIGN §12)
bind = $mod, Tab,      exec, uwsm app -- walker -m windows               # window switcher (HyDE)
bind = $mod SHIFT, E,  exec, uwsm app -- walker -m files                 # file finder (HyDE)
bind = $mod, comma,    exec, uwsm app -- walker -m unicode               # emoji picker (HyDE)
bind = $mod, period,   exec, uwsm app -- walker -m symbols               # glyph picker (HyDE)
bind = $mod, V,        exec, uwsm app -- sh -c 'cliphist list | walker -d -p Clipboard | cliphist decode | wl-copy'  # clipboard (HyDE)
bind = $mod SHIFT, V,  exec, uwsm app -- sh -c 'cliphist wipe && notify-send Tezca "Clipboard history cleared"'      # clipboard manager (HyDE)
bind = $mod, slash,    exec, $HOME/.config/hypr/scripts/cheatsheet.sh    # keybindings hint (HyDE)
bind = $mod SHIFT, A,  exec, $HOME/.local/bin/tezca settings             # control center (repurposed from HyDE "select launcher")

# ============================== Hardware — audio =============================
# HyDE binds the bare F10-F12 keys as well. These grab those keys globally, so
# they shadow in-app F10/F11/F12 — comment this block out if that bothers you.
bindl  = , F10, exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle        # mute output (HyDE)
bindel = , F11, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-           # volume down (HyDE)
bindel = , F12, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+           # volume up (HyDE)
# XF86 media keys (universal, always safe).
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle

# ============================== Hardware — media =============================
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous

# ============================ Hardware — brightness ==========================
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ================================= Utilities =================================
bind = $mod, K,        exec, hyprctl switchxkblayout current next        # toggle keyboard layout (HyDE)
bind = $mod ALT, G,    exec, $HOME/.local/bin/tezca game toggle          # game mode (HyDE + Tezca)
bind = $mod SHIFT, P,  exec, uwsm app -- hyprpicker -a                    # color picker → clipboard (HyDE)
bind = $mod, P,        exec, uwsm app -- hyprshot -m region               # snip screen (HyDE)
bind = $mod CTRL, P,   exec, uwsm app -- hyprshot -m region --freeze      # freeze and snip (HyDE)
bind = $mod ALT, P,    exec, uwsm app -- hyprshot -m output               # print focused monitor (HyDE)
bind = , Print,        exec, uwsm app -- hyprshot -m output               # print all monitors (HyDE)
bind = $mod CTRL, R,   exec, hyprctl reload                               # reload Hyprland config (Tezca)

# ============================ Theming and wallpaper ==========================
bind = $mod ALT, right, exec, $HOME/.config/hypr/scripts/wallpaper.sh next     # next wallpaper (HyDE)
bind = $mod ALT, left,  exec, $HOME/.config/hypr/scripts/wallpaper.sh prev      # previous wallpaper (HyDE)
bind = $mod SHIFT, W,   exec, $HOME/.config/hypr/scripts/wallpaper-select.sh    # select wallpaper (HyDE)
bind = $mod SHIFT, T,   exec, $HOME/.config/hypr/scripts/theme-select.sh        # select theme (HyDE)
bind = $mod SHIFT, R,   exec, $HOME/.config/hypr/scripts/theme-select.sh        # theme/mode selector (HyDE wallbash)
# Tezca ships a single curated Waybar layout / animation set / lock layout, so
# HyDE's SUPER+ALT+Up/Down, SUPER+SHIFT+Y and SUPER+SHIFT+U selectors are left
# unbound — tune those in tezca-settings (SUPER+SHIFT+A) instead.

# =========================== Workspaces — navigation =========================
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod CTRL, down,  workspace, empty          # nearest empty workspace (HyDE)
bind = $mod CTRL, right, workspace, r+1            # active workspace forwards (HyDE)
bind = $mod CTRL, left,  workspace, r-1            # active workspace backwards (HyDE)
bind = $mod, mouse_down, workspace, e+1            # next workspace (HyDE)
bind = $mod, mouse_up,   workspace, e-1            # previous workspace (HyDE)

# ============================ Workspaces — scratchpad ========================
bind = $mod, S,       togglespecialworkspace, scratch              # toggle scratchpad (HyDE)
bind = $mod SHIFT, S, movetoworkspace, special:scratch             # move to scratchpad (HyDE)
bind = $mod ALT, S,   movetoworkspacesilent, special:scratch       # move to scratchpad, silent (HyDE)

# ===================== Workspaces — move window to workspace =================
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Move window to workspace, silent (stay put) — HyDE uses SUPER+ALT+num.
bind = $mod ALT, 1, movetoworkspacesilent, 1
bind = $mod ALT, 2, movetoworkspacesilent, 2
bind = $mod ALT, 3, movetoworkspacesilent, 3
bind = $mod ALT, 4, movetoworkspacesilent, 4
bind = $mod ALT, 5, movetoworkspacesilent, 5
bind = $mod ALT, 6, movetoworkspacesilent, 6
bind = $mod ALT, 7, movetoworkspacesilent, 7
bind = $mod ALT, 8, movetoworkspacesilent, 8
bind = $mod ALT, 9, movetoworkspacesilent, 9
bind = $mod ALT, 0, movetoworkspacesilent, 10

# Move window to the next / previous relative workspace (HyDE).
bind = $mod ALT CTRL, right, movetoworkspace, r+1
bind = $mod ALT CTRL, left,  movetoworkspace, r-1

# ================================ Logout menu ================================
bind = ALT CTRL, Delete, exec, uwsm app -- wlogout -b 4             # logout menu (HyDE)

# ===================== Tezca identity (relocated to SUPER+ALT+*) =============
# Their natural HyDE keys (A = app finder, C = editor, D free) are taken by
# parity, so Tezca's signature actions cluster on the ALT layer. See ai.conf /
# gaming.conf for the window rules and profile logic behind these.
bind = $mod ALT, A,       togglespecialworkspace, ai                        # AI drop-down terminal (Claude Code)
bind = $mod ALT SHIFT, A, exec, uwsm app -- kitty --class tezca-ai -e claude  # (re)spawn the AI terminal
bind = $mod ALT, C,       exec, uwsm app -- sh -c 'command -v claude-desktop >/dev/null && claude-desktop || gtk-launch com.anthropic.Claude'  # Claude desktop app
bind = $mod ALT, D,       exec, pkill -USR1 -x tezca-dock                    # pin/unpin the bespoke dock
bind = $mod, D,           exec, pkill -USR1 -x tezca-dock                    # Tezca bonus alias (HyDE leaves SUPER+D free)
bind = $mod, N,           exec, uwsm app -- kitty --class tezca-note --title "Quick Note" -e sh -c 'mkdir -p ~/Documents && ${EDITOR:-nano} ~/Documents/tezca-notes.md'  # quick note (Tezca)
