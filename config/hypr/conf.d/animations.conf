# conf.d/animations.conf — smooth but restrained. 165 Hz means motion should
# feel instant, not sluggish. Tuned, not maxed (DESIGN.md §4).

animations {
    enabled = true

    # Custom beziers — a gentle overshoot for the "glass settling" feel.
    bezier = smoke,     0.25, 0.1, 0.25, 1.0
    bezier = obsidian,  0.05, 0.9, 0.1, 1.05
    bezier = snappy,    0.2, 1.0, 0.3, 1.0

    animation = windows,     1, 3.5, obsidian, popin 4%
    animation = windowsOut,  1, 3.0, smoke,    popin 4%
    animation = border,      1, 6.0, default
    animation = borderangle, 1, 30,  default, loop
    animation = fade,        1, 3.5, smoke
    animation = workspaces,  1, 4.0, snappy,   slide
    animation = specialWorkspace, 1, 4.5, obsidian, slidevert
}
