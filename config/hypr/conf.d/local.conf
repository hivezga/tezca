# conf.d/local.conf — machine-local overrides, sourced LAST (wins over all).
#
# This tracked stub exists so Hyprland's `source` never errors on a fresh clone.
# Put anything you don't want in the shared config here: a monitor tweak, an
# extra keybind, a debug setting. Example:
#
#   monitor = DP-3, 1920x1080@60, 0x-1080, 1
#   bind = SUPER, F12, exec, kitty --title debug
