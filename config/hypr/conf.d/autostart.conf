# conf.d/autostart.conf — session startup.
#
# Phase 1 keeps this deliberately MINIMAL: only what a bootable, correct session
# needs. The full aesthetic stack (Waybar, swaync, swww, walker, dock) is added
# in Phase 2 — its exec-once lines are staged below, commented, so enabling them
# later is a one-line uncomment.
#
# Launch GUI services through `uwsm app` so they land in the right systemd slice
# (correct cgroup accounting, clean shutdown).

# --- Phase 1: essential -------------------------------------------------
# Polkit agent — GUI auth prompts (sudo-in-GUI, mount, etc.).
exec-once = uwsm app -- systemctl --user start hyprpolkitagent 2>/dev/null || uwsm app -- /usr/lib/hyprpolkitagent/hyprpolkitagent

# Clipboard history daemon (text + images) — cheap, useful from day one.
exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

# --- Phase 2: aesthetic core --------------------------------------------
# Menubar + notification center.
exec-once = uwsm app -- waybar
exec-once = uwsm app -- swaync
# Walker launcher's provider backend (SUPER+SPACE). Must be up before walker is
# invoked; walker itself is launched on-demand by the keybind, not here.
exec-once = uwsm app -- elephant
# Wallpaper daemon. NOTE: swww was renamed "awww" upstream (Provides/Replaces
# swww, but the binaries are awww / awww-daemon — there is no swww-daemon).
exec-once = uwsm app -- awww-daemon
# Idle/lock/dpms orchestration (config: hypr/hypridle.conf).
exec-once = uwsm app -- hypridle
# Bespoke gtk4-rs magnifying macOS dock (Phase 5). Autohides at the bottom edge,
# magnifies on hover, glass + theme-driven colors. Reads ~/.config/tezca-dock/
# dock.toml. Launched through `uwsm app` for the correct systemd slice.
# NOTE: absolute path on purpose — the systemd --user PATH that uwsm apps inherit
# at login does NOT include ~/.local/bin (where install.sh puts the binary), so a
# bare `tezca-dock` would silently fail to launch. $HOME is expanded by the shell
# Hyprland runs exec-once through.
#   (Fallback: the old nwg-dock is still in the repo —
#    `exec-once = uwsm app -- ~/.config/nwg-dock-hyprland/dock.sh`.)
exec-once = uwsm app -- $HOME/.local/bin/tezca-dock

# --- Wallpaper ----------------------------------------------------------
# Flat obsidian base first (so there's never a jarring default-grey flash before
# the daemon is up), then `tezca wallpaper apply` paints the ACTIVE theme's
# wallpaper on every output AND re-applies any per-monitor overrides (set in
# tezca-settings → Displays). It reads ~/.config/tezca/current/wallpaper +
# monitor-wallpapers, so it follows theme switches automatically (no hard-coded
# image). Absolute path: ~/.local/bin isn't on the uwsm --user PATH at login.
exec-once = hyprctl keyword misc:background_color 0x0B0E0F
exec-once = sleep 1 && [ -x "$HOME/.local/bin/tezca" ] && "$HOME/.local/bin/tezca" wallpaper apply
