# Project:Tezca — smoke (curated) Hyprland border/shadow palette.
# Copied verbatim into ~/.config/tezca/current/colors-hypr.conf and sourced by
# conf.d/decoration.conf. Mirrors templates/colors-hypr.conf; the light
# counterpart of themes/obsidian/colors-hypr.conf (softer shadows on light glass).

$tz_accent     = rgba(1F8A82ff)
$tz_accent_dim = rgba(59B3ACff)
$tz_inactive   = rgba(C4CCCEcc)
$tz_shadow     = rgba(0000001f)
$tz_shadow_dim = rgba(00000012)
