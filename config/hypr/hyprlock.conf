# Project:Tezca — hyprlock (obsidian lockscreen).
# "Smoking mirror": the wallpaper, darkened and blurred behind a floating glass
# clock + input. Turquoise accent on focus. Native, GPU, NVIDIA-friendly.
#
# Phase 3 (matugen) will template the colors + wallpaper path from the current
# theme; until then these are the hand-tuned obsidian defaults.

$accent    = rgb(3FB8AF)
$accent_dim= rgb(2A8C86)
$text      = rgb(E8EAED)
$muted     = rgb(8B9398)
$obsidian  = rgb(0B0E0F)

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
}

background {
    monitor =
    path = $HOME/Project:Tezca/wallpapers/obsidian-teal.jpg
    # Darkened obsidian glass over the wallpaper.
    blur_passes = 3
    blur_size = 8
    brightness = 0.55
    contrast = 1.05
    vibrancy = 0.15
    color = $obsidian
}

# Big clock, upper-center.
label {
    monitor =
    text = $TIME
    font_size = 92
    font_family = Inter Display Light
    color = $text
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(0,0,0,0.5)
}

# Date under the clock.
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 22
    font_family = Inter
    color = $muted
    position = 0, 108
    halign = center
    valign = center
}

# "Smoking mirror" wordmark, subtle, above the input.
label {
    monitor =
    text = Tezca
    font_size = 16
    font_family = Inter SemiBold
    color = $accent
    position = 0, 20
    halign = center
    valign = center
}

# Password input — floating obsidian glass pill, turquoise on focus.
input-field {
    monitor =
    size = 340, 56
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.32
    dots_center = true
    dots_rounding = -1
    rounding = 16
    outer_color = rgba(63,184,175,0.35)
    inner_color = rgba(11,14,15,0.72)
    font_color = $text
    check_color = $accent
    fail_color = rgb(E06C75)
    capslock_color = rgb(C9A24B)
    placeholder_text = <span foreground="##8B9398">Unlock</span>
    fail_text = <span foreground="##E06C75">$FAIL</span>
    position = 0, -60
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 10
    shadow_color = rgba(0,0,0,0.5)
}
