# Project:Tezca — tezca-bar configuration.
#
# The bespoke gtk4-rs top menubar (DESIGN.md §6), replacing Waybar. A thin
# translucent obsidian strip across the top of every monitor: per-app label +
# workspaces on the left, now-playing centred, metrics/controls/clock/power on
# the right, with expandable glass popovers. Colors follow the active theme
# (`tezca theme`) automatically — nothing here hard-codes a hex.
#
# tezca-bar reads this file on launch; `tezca bar restart` after editing (or
# `tezca bar set <key> <value>`, which edits + restarts for you).

# --- Shape -----------------------------------------------------------------
# floating : rounded glass strip, inset from the screen edges (macOS feel).
# edge     : full-width, square, edge-to-edge, single bottom hairline.
shape = floating

# --- Geometry --------------------------------------------------------------
height = 40  # bar height, px (the glass strip)
margin_top = 6  # gap above the bar (floating only), px
margin_side = 10  # gap left/right of the bar (floating only), px

# --- Poll intervals (seconds) ----------------------------------------------
cpu_interval = 3  # CPU sparkline + percentage
mem_interval = 5  # MEM sparkline + percentage
gpu_interval = 3  # GPU sparkline + percentage (auto-hidden if no GPU source)
net_interval = 5  # network glyph + throughput

# --- Clock -----------------------------------------------------------------
# strftime-style; matches the Waybar format the bar reaches parity with.
clock_format = "%a %d %b   %H:%M"

# --- Per-monitor adaptive --------------------------------------------------
# Monitors narrower than this (px) render the COMPACT layout — no per-app menu
# label, tighter padding. The 3440×1440 ultrawide primary stays full; the
# 2560×1440 secondary goes compact. Set very high to force compact everywhere.
compact_width = 3000

# --- Workspaces ------------------------------------------------------------
# Pill labels: "arabic" (1 2 3 …) or "mayan" — the Mesoamerican bar-and-dot
# numerals (a dot = 1, a bar = 5), from the Unicode Mayan Numerals block.
# Needs the Noto Sans Mayan Numerals font (Noto extra fonts).
workspace_numerals = mayan

# Show only workspaces that are in use — occupied by a window, or focused —
# hiding empty pills. Applies to both assigned and dynamic sets.
workspace_hide_empty = true

# Assign which workspaces each monitor's bar shows, by connector name. A monitor
# listed here shows exactly those pills, always (empty ones included), in order;
# unlisted monitors mirror whatever Hyprland has placed on them. Accepts an
# explicit list ("1,3,5,7,9"), a range ("1-5"), or the shorthands "odd"/"even".
# Keep these in step with the Hyprland `workspace = N, monitor:X` binding rules
# in conf.d/monitors.conf so a pill switches to a workspace that lives here.
#   DP-1 = Xiaomi ultrawide · DP-3 = LG UltraGear (see `hyprctl monitors`).
workspaces.DP-1 = odd    # 1 3 5 7 9  on the Xiaomi ultrawide
workspaces.DP-3 = even   # 2 4 6 8 10 on the LG
