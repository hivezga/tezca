# conf.d/keybinds.conf — SUPER is the Tezca modifier (⌘-like). Mnemonic.
# Cheat-sheet: SUPER+/ . Full philosophy in DESIGN.md §12.
#
# $mod is defined in input.conf.

# --- Core launchers -------------------------------------------------------
bind = $mod, Return, exec, uwsm app -- kitty
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exec, uwsm stop        # log out of the session cleanly
bind = $mod, V, togglefloating
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, fullscreen, 1          # maximize (keep bar/gaps)
bind = $mod, P, pseudo
bind = $mod, J, togglesplit

# Spotlight muscle memory. Walker arrives in Phase 2; wofi is the fallback so
# this binding works on a bare Phase 1 session too (whichever is installed).
bind = $mod, SPACE, exec, uwsm app -- sh -c 'command -v walker >/dev/null && walker || wofi --show drun'

# --- Focus (vim + arrows) -------------------------------------------------
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, semicolon, movefocus, d

# --- Move windows ---------------------------------------------------------
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# --- Resize (repeatable) --------------------------------------------------
binde = $mod CTRL, left,  resizeactive, -40 0
binde = $mod CTRL, right, resizeactive, 40 0
binde = $mod CTRL, up,    resizeactive, 0 -40
binde = $mod CTRL, down,  resizeactive, 0 40

# --- Workspaces (1–10) ----------------------------------------------------
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT, 9, movetoworkspacesilent, 9
bind = $mod SHIFT, 0, movetoworkspacesilent, 10

# Cycle workspaces on the focused monitor.
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# --- Scratchpad (drop-down terminal) --------------------------------------
bind = $mod, grave, togglespecialworkspace, scratch
bind = $mod SHIFT, grave, exec, uwsm app -- kitty --class tezca-scratch

# --- Mouse: move / resize floating ----------------------------------------
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# --- Screenshots (hyprshot; Phase 2 dep, harmless if absent) --------------
bind = , Print,        exec, uwsm app -- hyprshot -m region
bind = SHIFT, Print,   exec, uwsm app -- hyprshot -m window
bind = CTRL, Print,    exec, uwsm app -- hyprshot -m output

# --- Media / brightness (XF86) --------------------------------------------
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- System ---------------------------------------------------------------
# SUPER+L is movefocus-right (above), so lock lives on SUPER+SHIFT+L.
bind = $mod SHIFT, L, exec, uwsm app -- hyprlock
bind = $mod SHIFT, R, exec, hyprctl reload
# Cheat-sheet overlay (SUPER+/). Wired to a real overlay in a later phase;
# for now it reloads help via a notification if swaync is present.
bind = $mod, slash, exec, notify-send "Tezca" "Keybinds: see conf.d/keybinds.conf" || true
