# conf.d/windowrules.conf — floating dialogs, glass tweaks, scratchpad.

# Common transient windows should float and center.
windowrule = float, class:^(pavucontrol|nm-connection-editor|blueman-manager)$
windowrule = float, class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float, title:^(Open File|Save File|Save As|Choose Files)$
windowrule = float, class:^(xdg-desktop-portal-gtk)$

# Picture-in-picture always floats and pins.
windowrule = float, title:^(Picture-in-Picture)$
windowrule = pin,   title:^(Picture-in-Picture)$

# Keep fully-opaque content crisp behind glass (no blur cost, no dim).
windowrule = opaque,   class:^(mpv|vlc)$
windowrule = noblur,   class:^(mpv|vlc)$
windowrule = opaque,   fullscreen:1

# Dialogs get the soft shadow but no rounding oddities.
windowrule = rounding 8, floating:1

# Scratchpad drop-down terminal (SUPER+grave). Special workspace.
windowrule = float,  class:^(tezca-scratch)$
windowrule = size 60% 55%, class:^(tezca-scratch)$
windowrule = center, class:^(tezca-scratch)$
windowrule = workspace special:scratch, class:^(tezca-scratch)$

# Suppress the "maximize" activate events some apps spam.
windowrule = suppressevent maximize, class:.*
