# conf.d/windowrules.conf â€” floating dialogs, glass tweaks, scratchpad.
#
# Hyprland 0.55 overhauled the windowrule grammar (the old `windowrulev2` and the
# `class:^()$` matcher are gone). New shape:
#
#   windowrule = <rule> <value>, match:<key> <regex>[, match:<key2> <regex2>]
#
# Booleans take an explicit `on`/`off`. Matchers use `match:class`, `match:title`,
# `match:float`, `match:fullscreen`, etc. Renames from the old config:
#   floatâ†’float on Â· noblurâ†’no_blur on Â· noshadowâ†’no_shadow on Â· pinâ†’pin on
#   suppresseventâ†’suppress_event Â· class:X â†’ match:class X Â· floating:1 â†’ match:float 1

# Common transient windows should float and center.
windowrule = float on, match:class ^(pavucontrol|nm-connection-editor|blueman-manager)$
windowrule = float on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float on, match:title ^(Open File|Save File|Save As|Choose Files)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$

# Picture-in-picture always floats and pins.
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = pin on,   match:title ^(Picture-in-Picture)$

# Keep fully-opaque content crisp behind glass (no blur cost, no dim).
windowrule = opaque on,  match:class ^(mpv|vlc)$
windowrule = no_blur on, match:class ^(mpv|vlc)$
windowrule = opaque on,  match:fullscreen 1

# Dialogs get the soft shadow but no rounding oddities.
windowrule = rounding 8, match:float 1

# Scratchpad drop-down terminal (SUPER+grave). Special workspace.
windowrule = float on,               match:class ^(tezca-scratch)$
windowrule = size 60% 55%,           match:class ^(tezca-scratch)$
windowrule = center on,              match:class ^(tezca-scratch)$
windowrule = workspace special:scratch, match:class ^(tezca-scratch)$

# Suppress the "maximize" activate events some apps spam.
windowrule = suppress_event maximize, match:class .*
