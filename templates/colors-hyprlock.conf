# Project:Tezca — hyprlock palette + wallpaper (matugen template).
#
# Rendered by matugen into ~/.config/tezca/current/colors-hyprlock.conf and
# `source`d at the top of hyprlock.conf. The `tezca` CLI substitutes the
# wallpaper-path placeholder on $tz_wallpaper after matugen runs (matugen colors
# the palette; the CLI owns the path).
#
# Safety-critical surface: keep it small. Placeholder/fail markup stays literal
# in hyprlock.conf; only the core colors + wallpaper are themed here.

$tz_wallpaper     = __TZ_WALLPAPER__
$tz_base          = rgb({{colors.surface_container_lowest.default.hex_stripped}})
$tz_text          = rgb({{colors.on_surface.default.hex_stripped}})
$tz_muted         = rgb({{colors.outline.default.hex_stripped}})
$tz_accent        = rgb({{colors.primary.default.hex_stripped}})
$tz_gold          = rgb(C9A24B)
$tz_urgent        = rgb(E06C75)
$tz_input_outline = rgba({{colors.primary.default.hex_stripped}}59)
$tz_input_bg      = rgba({{colors.surface_container_lowest.default.hex_stripped}}b8)
