# conf.d/gaming.conf — the lean, low-latency path (DESIGN.md §9).
#
# `allow_tearing = true` is set globally in decoration.conf, but tearing only
# actually happens for windows that opt in via the `immediate` rule below.
# Desktop apps stay tear-free; games get the lowest-latency present.
#
# `tezca game on` (Phase 6) will layer runtime tweaks (blur off, MangoHud,
# gamemode) on top of these static rules.
#
# 0.55 windowrule grammar — see conf.d/windowrules.conf header for the full note.

# Known game/launcher classes → allow tearing (immediate present).
windowrule = immediate on, match:class ^(steam_app_.*)$
windowrule = immediate on, match:class ^(gamescope)$
windowrule = immediate on, match:class ^(cs2|dota2|.*\.exe)$

# Games: no blur, fully opaque, no shadow — every frame counts.
windowrule = no_blur on,   match:class ^(steam_app_.*)$
windowrule = opaque on,    match:class ^(steam_app_.*)$
windowrule = no_shadow on, match:class ^(steam_app_.*)$

# Steam's own client windows behave better floating for dialogs.
windowrule = float on, match:class ^(steam)$, match:title ^(Friends List|Steam Settings)$

# gamescope sessions go fullscreen immediately.
windowrule = fullscreen on, match:class ^(gamescope)$
