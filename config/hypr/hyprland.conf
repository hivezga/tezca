# Launched via uwsm — environment lives in ~/.config/uwsm/{env,env-hyprland},
# NOT here. Do not add `env =` lines below; put them in uwsm/env.

source = ~/.config/hypr/conf.d/nvidia.conf
source = ~/.config/hypr/conf.d/monitors.conf
source = ~/.config/hypr/conf.d/input.conf
source = ~/.config/hypr/conf.d/decoration.conf
source = ~/.config/hypr/conf.d/animations.conf
source = ~/.config/hypr/conf.d/windowrules.conf
source = ~/.config/hypr/conf.d/keybinds.conf
source = ~/.config/hypr/conf.d/gaming.conf
source = ~/.config/hypr/conf.d/ai.conf
source = ~/.config/hypr/conf.d/autostart.conf

# Optional machine-local overrides — git-ignored, sourced last so it wins.
# Create ~/.config/hypr/conf.d/local.conf for anything you don't want committed.
source = ~/.config/hypr/conf.d/local.conf
