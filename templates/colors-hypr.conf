# Project:Tezca — Hyprland border/shadow palette (matugen template).
#
# Rendered by matugen into ~/.config/tezca/current/colors-hypr.conf and
# `source`d at the top of conf.d/decoration.conf, which references these $tz_*
# variables in the general{} border and decoration{} shadow blocks. Swapping the
# wallpaper recolors the window borders live on `hyprctl reload`.

$tz_accent     = rgba({{colors.primary.default.hex_stripped}}ff)
$tz_accent_dim = rgba({{colors.primary_container.default.hex_stripped}}ff)
$tz_inactive   = rgba({{colors.surface_container_high.default.hex_stripped}}aa)
$tz_shadow     = rgba(00000055)
$tz_shadow_dim = rgba(00000033)
