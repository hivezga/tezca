# conf.d/nvidia.conf — Hyprland-side NVIDIA correctness.
#
# The heavy lifting (env vars) is in ~/.config/uwsm/env. This file only holds
# the few compositor-level settings that matter on nvidia-open + RTX 4070 Ti.

# Explicit sync is the modern, flicker-free path on nvidia-open. As of Hyprland
# 0.55 it is always-on and driver-negotiated — the old `render:explicit_sync`
# and `explicit_sync_kms` knobs were REMOVED, so we no longer set them (setting
# them errors the config). This is what replaces the old stutter hacks.
render {
    direct_scanout = true      # let fullscreen games bypass compositing (latency)
}

cursor {
    # nvidia-open + explicit sync handles HW cursors fine, so we keep them
    # (no_hardware_cursors stays false). If you ever see a stuck/ghost cursor,
    # flip this to true in conf.d/local.conf.
    no_hardware_cursors = false
    enable_hyprcursor = true
}
