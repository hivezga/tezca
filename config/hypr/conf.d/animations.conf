# conf.d/animations.conf — smooth but restrained. 165 Hz means motion should
# feel instant, not sluggish. Tuned, not maxed (DESIGN.md §4).
#
# Phase 4 polish: shorter, more decisive window/workspace timings; explicit
# fade curves; and a `layers` animation so the shell surfaces (swaync, Walker,
# and the autohiding dock) glide in as glass instead of snapping.

animations {
    enabled = true

    # Custom beziers — a gentle overshoot for the "glass settling" feel.
    bezier = smoke,     0.25, 0.10, 0.25, 1.00   # ease-out, for fades
    bezier = obsidian,  0.05, 0.90, 0.10, 1.05   # settle with a hair of overshoot
    bezier = snappy,    0.20, 1.00, 0.30, 1.00   # quick, no overshoot — workspaces
    bezier = glass,     0.16, 1.00, 0.30, 1.00   # layers/dock slide-and-settle

    # Windows — pop in from near their final size, out a touch faster.
    animation = windows,      1, 3.2, obsidian, popin 6%
    animation = windowsIn,    1, 3.2, obsidian, popin 6%
    animation = windowsOut,   1, 2.6, smoke,    popin 6%
    animation = windowsMove,  1, 3.0, snappy

    # Active-window accent border (breathing gradient sweep).
    animation = border,       1, 6.0, default
    animation = borderangle,  1, 30,  default, loop

    # Fades.
    animation = fade,         1, 3.0, smoke
    animation = fadeIn,       1, 3.0, smoke
    animation = fadeOut,      1, 2.4, smoke
    animation = fadeDim,      1, 3.0, smoke

    # Shell layers — swaync / Walker / the dock glide in from their edge.
    animation = layers,       1, 3.0, glass, slide
    animation = layersIn,     1, 3.0, glass, slide
    animation = layersOut,    1, 2.4, smoke, slide

    # Workspaces.
    animation = workspaces,        1, 3.6, snappy,   slide
    animation = specialWorkspace,  1, 4.0, obsidian, slidevert
}
